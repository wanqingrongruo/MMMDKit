name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift-test:
    name: SwiftPM 测试
    runs-on: macos-15

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 显示 Swift 版本
        run: swift --version

      - name: 解析 SwiftPM 依赖
        run: swift package resolve

      - name: 运行单元测试
        run: swift test

  pod-lint:
    name: CocoaPods 配置检查
    runs-on: macos-15

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 显示 CocoaPods 版本
        run: pod --version

      - name: 校验 podspec
        run: |
          export LANG=en_US.UTF-8
          for spec in MMMDCore.podspec MMMDParserCmark.podspec MMMDStreaming.podspec MMMDHighlighter.podspec MMMDMath.podspec MMMDHTML.podspec MMMDUIKit.podspec MMMDAppKit.podspec MMMDKit.podspec; do
            pod ipc spec "$spec" > /dev/null
          done
